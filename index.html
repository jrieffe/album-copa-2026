<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>⚽ Álbum Copa do Mundo 2026</title>
<style>
:root {
  --bg: #0a0e1a;
  --surface: #12192e;
  --surface2: #1a2540;
  --accent: #FFD700;
  --accent2: #ff6b35;
  --green: #22c55e;
  --red: #ef4444;
  --gold: #FFD700;
  --blue: #3b82f6;
  --text: #e2e8f0;
  --text2: #94a3b8;
  --border: #2a3a5c;
  --radius: 12px;
  --shadow: 0 4px 20px rgba(0,0,0,0.4);
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body { background: var(--bg); color: var(--text); font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; min-height: 100vh; }

/* HEADER */
.header { background: linear-gradient(135deg, #0a0e1a 0%, #1a2540 100%); border-bottom: 1px solid var(--border); padding: 12px 16px; position: sticky; top: 0; z-index: 100; }
.header-top { display: flex; align-items: center; gap: 12px; margin-bottom: 10px; }
.header-logo { font-size: 28px; }
.header-title { flex: 1; }
.header-title h1 { font-size: 18px; font-weight: 800; color: var(--accent); letter-spacing: -0.5px; }
.header-title p { font-size: 12px; color: var(--text2); }
.header-stats { display: flex; gap: 8px; flex-wrap: wrap; }
.stat-pill { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; padding: 4px 10px; font-size: 12px; font-weight: 600; white-space: nowrap; }
.stat-pill.green { border-color: var(--green); color: var(--green); }
.stat-pill.red { border-color: var(--red); color: var(--red); }
.stat-pill.gold { border-color: var(--gold); color: var(--gold); }
.progress-bar-wrap { background: var(--border); border-radius: 4px; height: 6px; overflow: hidden; }
.progress-bar-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 4px; transition: width 0.5s ease; }
.search-wrap { margin-top: 8px; position: relative; }
.search-wrap input { width: 100%; background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 14px; padding: 8px 12px 8px 36px; outline: none; transition: border-color 0.2s; }
.search-wrap input:focus { border-color: var(--accent); }
.search-wrap .search-icon { position: absolute; left: 10px; top: 50%; transform: translateY(-50%); opacity: 0.5; font-size: 16px; }
.search-wrap .clear-btn { position: absolute; right: 8px; top: 50%; transform: translateY(-50%); background: none; border: none; color: var(--text2); cursor: pointer; font-size: 18px; display: none; padding: 2px 4px; }

/* NAV TABS */
.tabs { display: flex; background: var(--surface); border-bottom: 1px solid var(--border); overflow-x: auto; scrollbar-width: none; }
.tabs::-webkit-scrollbar { display: none; }
.tab { padding: 10px 16px; font-size: 13px; font-weight: 600; color: var(--text2); cursor: pointer; white-space: nowrap; border-bottom: 2px solid transparent; transition: all 0.2s; user-select: none; }
.tab.active { color: var(--accent); border-bottom-color: var(--accent); }
.tab:hover { color: var(--text); }

/* LAYOUT */
.layout { display: flex; min-height: calc(100vh - 140px); }
.sidebar { width: 220px; background: var(--surface); border-right: 1px solid var(--border); overflow-y: auto; flex-shrink: 0; }
.main { flex: 1; overflow-y: auto; padding: 16px; }
@media (max-width: 640px) {
  .sidebar { display: none; }
  .layout { flex-direction: column; }
  .main { padding: 12px; }
}

/* SIDEBAR */
.sidebar-section { padding: 8px 0; }
.sidebar-group-label { font-size: 10px; font-weight: 700; color: var(--text2); letter-spacing: 1px; padding: 8px 12px 4px; text-transform: uppercase; }
.sidebar-item { display: flex; align-items: center; gap: 8px; padding: 7px 12px; cursor: pointer; border-left: 3px solid transparent; transition: all 0.15s; user-select: none; }
.sidebar-item:hover { background: var(--surface2); }
.sidebar-item.active { background: var(--surface2); border-left-color: var(--accent); }
.sidebar-item .flag { font-size: 18px; width: 24px; text-align: center; }
.sidebar-item .info { flex: 1; min-width: 0; }
.sidebar-item .name { font-size: 13px; font-weight: 600; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.sidebar-item .progress { font-size: 10px; color: var(--text2); margin-top: 2px; }
.sidebar-mini-bar { height: 3px; background: var(--border); border-radius: 2px; margin-top: 3px; overflow: hidden; }
.sidebar-mini-fill { height: 100%; background: var(--green); border-radius: 2px; }

/* COUNTRY GRID (visão geral) */
.country-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 12px; }
.country-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; cursor: pointer; transition: all 0.2s; position: relative; overflow: hidden; }
.country-card:hover { border-color: var(--accent); transform: translateY(-2px); box-shadow: var(--shadow); }
.country-card.active { border-color: var(--accent); background: var(--surface2); }
.country-card .flag { font-size: 36px; text-align: center; margin-bottom: 8px; }
.country-card .cname { font-size: 14px; font-weight: 700; text-align: center; margin-bottom: 4px; }
.country-card .cgroup { font-size: 11px; color: var(--text2); text-align: center; margin-bottom: 8px; }
.country-card .cprog { font-size: 12px; color: var(--green); text-align: center; font-weight: 600; }
.country-card .cbar { height: 4px; background: var(--border); border-radius: 2px; margin-top: 6px; overflow: hidden; }
.country-card .cbar-fill { height: 100%; background: linear-gradient(90deg, var(--green), var(--accent)); border-radius: 2px; transition: width 0.4s; }
.country-card .cbadge { position: absolute; top: 8px; right: 8px; background: var(--red); color: white; font-size: 10px; font-weight: 700; border-radius: 10px; padding: 1px 6px; }
.country-card .cbadge.gold { background: var(--gold); color: #000; }

/* STICKER VIEW */
.section-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
.section-flag { font-size: 40px; }
.section-info h2 { font-size: 20px; font-weight: 800; }
.section-info p { font-size: 13px; color: var(--text2); margin-top: 2px; }
.section-stats { display: flex; gap: 8px; margin-left: auto; flex-wrap: wrap; }
.back-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 13px; padding: 6px 12px; transition: all 0.2s; margin-bottom: 12px; display: none; }
.back-btn:hover { border-color: var(--accent); color: var(--accent); }
@media (max-width: 640px) { .back-btn { display: flex; align-items: center; gap: 6px; } }

/* STICKER GRID */
.sticker-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; }
@media (max-width: 480px) { .sticker-grid { grid-template-columns: repeat(auto-fill, minmax(85px, 1fr)); gap: 8px; } }

.sticker-card { background: var(--surface); border: 2px solid var(--border); border-radius: 10px; padding: 10px 8px; text-align: center; cursor: pointer; transition: all 0.2s; user-select: none; position: relative; }
.sticker-card:active { transform: scale(0.95); }

.sticker-card.missing { border-color: var(--red); background: rgba(239,68,68,0.05); }
.sticker-card.collected { border-color: var(--green); background: rgba(34,197,94,0.08); }
.sticker-card.double { border-color: var(--gold); background: rgba(255,215,0,0.08); }

.sticker-card .sticker-status { font-size: 22px; margin-bottom: 4px; }
.sticker-card .sticker-code { font-size: 11px; font-weight: 700; color: var(--text2); letter-spacing: 0.5px; }
.sticker-card .sticker-player { font-size: 10px; color: var(--text); margin-top: 3px; line-height: 1.3; font-weight: 500; min-height: 28px; display: flex; align-items: center; justify-content: center; }
.sticker-card.missing .sticker-player { color: var(--text2); }

/* STATUS LABELS */
.sticker-card .status-label { position: absolute; top: -6px; right: -6px; font-size: 9px; font-weight: 800; border-radius: 8px; padding: 1px 5px; letter-spacing: 0.3px; }
.sticker-card.missing .status-label { background: var(--red); color: white; content: "FALTA"; }
.sticker-card.collected .status-label { background: var(--green); color: white; }
.sticker-card.double .status-label { background: var(--gold); color: #000; }

/* FILTER BAR */
.filter-bar { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
.filter-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 20px; color: var(--text2); cursor: pointer; font-size: 12px; font-weight: 600; padding: 5px 12px; transition: all 0.2s; }
.filter-btn.active { border-color: var(--accent); color: var(--accent); background: rgba(255,215,0,0.1); }
.filter-btn:hover { border-color: var(--text); color: var(--text); }

/* TRADE SECTION */
.trade-section { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-top: 16px; }
.trade-section h3 { font-size: 14px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; }
.trade-list { display: flex; gap: 6px; flex-wrap: wrap; }
.trade-tag { background: var(--surface2); border: 1px solid; border-radius: 6px; font-size: 11px; font-weight: 600; padding: 3px 8px; }
.trade-tag.have { border-color: var(--gold); color: var(--gold); }
.trade-tag.need { border-color: var(--red); color: var(--red); }

/* LEGEND */
.legend { display: flex; gap: 16px; flex-wrap: wrap; margin-bottom: 12px; font-size: 12px; }
.legend-item { display: flex; align-items: center; gap: 6px; color: var(--text2); }
.legend-dot { width: 12px; height: 12px; border-radius: 50%; border: 2px solid; }
.legend-dot.missing { border-color: var(--red); background: rgba(239,68,68,0.2); }
.legend-dot.collected { border-color: var(--green); background: rgba(34,197,94,0.2); }
.legend-dot.double { border-color: var(--gold); background: rgba(255,215,0,0.2); }

/* INSTRUCTIONS */
.instructions { background: linear-gradient(135deg, rgba(255,215,0,0.05), rgba(255,107,53,0.05)); border: 1px solid rgba(255,215,0,0.2); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; font-size: 13px; line-height: 1.6; }
.instructions strong { color: var(--accent); }

/* MODAL */
.modal-overlay { display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 1000; align-items: center; justify-content: center; padding: 20px; }
.modal-overlay.open { display: flex; }
.modal { background: var(--surface); border: 1px solid var(--border); border-radius: 16px; max-width: 400px; width: 100%; padding: 24px; position: relative; }
.modal h2 { font-size: 20px; margin-bottom: 8px; }
.modal p { color: var(--text2); font-size: 14px; line-height: 1.6; margin-bottom: 16px; }
.modal-close { position: absolute; top: 16px; right: 16px; background: none; border: none; color: var(--text2); cursor: pointer; font-size: 24px; line-height: 1; }
.modal-btns { display: flex; gap: 8px; flex-direction: column; }
.modal-btn { border: 2px solid; border-radius: 10px; cursor: pointer; font-size: 14px; font-weight: 700; padding: 12px; text-align: center; transition: all 0.2s; }
.modal-btn.collected { border-color: var(--green); background: rgba(34,197,94,0.1); color: var(--green); }
.modal-btn.double { border-color: var(--gold); background: rgba(255,215,0,0.1); color: var(--gold); }
.modal-btn.missing { border-color: var(--red); background: rgba(239,68,68,0.1); color: var(--red); }
.modal-btn:hover { opacity: 0.8; transform: scale(1.02); }

/* RESET BTN */
.reset-btn { background: none; border: 1px solid var(--border); border-radius: 8px; color: var(--text2); cursor: pointer; font-size: 12px; padding: 6px 12px; }
.reset-btn:hover { border-color: var(--red); color: var(--red); }

/* TOOLBAR */
.toolbar { display: flex; align-items: center; gap: 6px; flex-wrap: wrap; margin-top: 8px; padding-top: 8px; border-top: 1px solid var(--border); }
.tool-btn { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); cursor: pointer; font-size: 12px; font-weight: 600; padding: 6px 11px; transition: all 0.2s; white-space: nowrap; }
.tool-btn:hover { border-color: var(--accent); color: var(--accent); }
.tool-btn.primary { border-color: var(--green); color: var(--green); }
.tool-btn.primary:hover { background: rgba(34,197,94,0.15); }
.tool-btn.warning { border-color: var(--gold); color: var(--gold); }
.tool-btn.warning:hover { background: rgba(255,215,0,0.1); }
.tool-btn.print-btn { border-color: var(--blue); color: var(--blue); }
.tool-btn.print-btn:hover { background: rgba(59,130,246,0.1); }
.db-status { font-size: 11px; color: var(--text2); display: flex; align-items: center; gap: 4px; margin-left: auto; }
.db-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--text2); }
.db-dot.saved { background: var(--green); }
.db-dot.unsaved { background: var(--gold); animation: pulse 1s infinite; }
.name-input { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; color: var(--text); font-size: 12px; padding: 5px 10px; outline: none; width: 160px; }
.name-input:focus { border-color: var(--accent); }
@keyframes pulse { 0%,100%{opacity:1} 50%{opacity:0.4} }

/* PRINT STYLES */
@media print {
  body { background: white !important; color: black !important; }
  .no-print { display: none !important; }
  .print-only { display: block !important; }
}
.print-only { display: none; }

/* GROUPS OVERVIEW */
.groups-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 16px; }
.group-card { background: var(--surface); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
.group-header { background: linear-gradient(135deg, #1a2540, #243060); padding: 10px 14px; display: flex; align-items: center; justify-content: space-between; }
.group-header h3 { font-size: 15px; font-weight: 800; }
.group-header .gprog { font-size: 12px; color: var(--text2); }
.group-teams { padding: 8px; }
.group-team-row { display: flex; align-items: center; gap: 8px; padding: 6px 8px; border-radius: 6px; margin-bottom: 2px; cursor: pointer; transition: all 0.15s; }
.group-team-row:hover { background: var(--surface2); }
.group-team-row .flag { font-size: 20px; }
.group-team-row .tname { flex: 1; font-size: 13px; font-weight: 600; }
.group-team-row .tprog { font-size: 11px; color: var(--text2); text-align: right; }
.group-team-row .tmini { width: 60px; height: 4px; background: var(--border); border-radius: 2px; overflow: hidden; }
.group-team-row .tmini-fill { height: 100%; background: var(--green); border-radius: 2px; }

/* EMPTY STATE */
.empty-state { text-align: center; padding: 60px 20px; color: var(--text2); }
.empty-state .icon { font-size: 60px; margin-bottom: 16px; }
.empty-state h3 { font-size: 18px; color: var(--text); margin-bottom: 8px; }

/* MISSING LIST */
.missing-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 10px; }
.missing-item { background: var(--surface); border: 1px solid rgba(239,68,68,0.3); border-radius: 8px; padding: 10px 12px; display: flex; align-items: center; gap: 10px; }
.missing-item .flag { font-size: 22px; }
.missing-item .minfo { flex: 1; }
.missing-item .mcode { font-size: 12px; font-weight: 700; color: var(--red); }
.missing-item .mplayer { font-size: 11px; color: var(--text2); margin-top: 2px; }

/* TOAST */
.toast { position: fixed; bottom: 20px; left: 50%; transform: translateX(-50%) translateY(100px); background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 10px 20px; font-size: 14px; font-weight: 600; transition: transform 0.3s; z-index: 2000; pointer-events: none; }
.toast.show { transform: translateX(-50%) translateY(0); }
</style>
</head>
<body>

<!-- HEADER -->
<div class="header no-print">
  <div class="header-top">
    <div class="header-logo">🏆</div>
    <div class="header-title">
      <h1>Álbum Copa do Mundo 2026</h1>
      <p id="headerSub">FIFA World Cup 2026™ — Panini</p>
    </div>
    <button class="reset-btn" onclick="confirmReset()">🔄 Resetar</button>
  </div>
  <div class="header-stats" id="headerStats"></div>
  <div class="progress-bar-wrap" style="margin-top:8px">
    <div class="progress-bar-fill" id="mainProgressBar" style="width:0%"></div>
  </div>
  <div class="search-wrap" style="margin-top:8px">
    <span class="search-icon">🔍</span>
    <input type="text" id="searchInput" placeholder="Buscar figurinha ou jogador..." oninput="handleSearch()">
    <button class="clear-btn" id="clearSearch" onclick="clearSearch()">✕</button>
  </div>
  <!-- TOOLBAR -->
  <div class="toolbar">
    <input id="childName" class="name-input" type="text" placeholder="✏️ Nome da criança..." oninput="saveChildName()">
    <button class="tool-btn primary" onclick="saveToFile()" title="Salvar dados em arquivo JSON independente">💾 Salvar BD</button>
    <button class="tool-btn" onclick="loadFromFile()" title="Carregar dados de arquivo JSON salvo anteriormente">📂 Carregar BD</button>
    <button class="tool-btn warning" onclick="downloadBackup()" title="Baixar cópia de segurança JSON">⬇️ Backup</button>
    <button class="tool-btn" onclick="document.getElementById('uploadInput').click()" title="Restaurar de backup JSON">⬆️ Restaurar</button>
    <button class="tool-btn print-btn" onclick="printReport()" title="Gerar lista imprimível para trocas">🖨️ Imprimir Lista</button>
    <div class="db-status">
      <div class="db-dot" id="dbDot"></div>
      <span id="dbStatusText">localStorage</span>
    </div>
  </div>
</div>
<input type="file" id="uploadInput" accept=".json" style="display:none" onchange="restoreFromUpload(this)">

<!-- TABS -->
<div class="tabs">
  <div class="tab active" onclick="switchTab('overview')" id="tab-overview">🌍 Visão Geral</div>
  <div class="tab" onclick="switchTab('grupos')" id="tab-grupos">📋 Por Grupo</div>
  <div class="tab" onclick="switchTab('stickers')" id="tab-stickers">🃏 Figurinhas</div>
  <div class="tab" onclick="switchTab('missing')" id="tab-missing">❌ Faltam</div>
  <div class="tab" onclick="switchTab('trade')" id="tab-trade">⭐ Para Trocar</div>
</div>

<!-- LAYOUT -->
<div class="layout">
  <div class="sidebar" id="sidebar"></div>
  <div class="main" id="mainContent"></div>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="closeModal(event)">
  <div class="modal" id="modalContent">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div id="modalBody"></div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

const SUPABASE_URL      = 'https://blmahowfhyrsipupjgex.supabase.co';
const SUPABASE_ANON_KEY = 'sb_publishable_f1ebmr5KsYBhi4kg_YQh-g_fonWcwsC';
const CLOUD_ID          = 'copa2026_familia';

function _sbHeaders(extra) {
  return Object.assign({
    'apikey': SUPABASE_ANON_KEY,
    'Authorization': 'Bearer ' + SUPABASE_ANON_KEY,
    'Content-Type': 'application/json'
  }, extra || {});
}

async function cloudLoad() {
  if (!SUPABASE_URL) return null;
  const r = await fetch(
    SUPABASE_URL + '/rest/v1/album_state?id=eq.' + CLOUD_ID + '&select=state',
    { headers: _sbHeaders() }
  );
  if (!r.ok) return null;
  const rows = await r.json();
  return rows.length ? rows[0].state : null;
}

let _cloudTimer = null;
function cloudSaveDebounced() {
  if (!SUPABASE_URL) return;
  clearTimeout(_cloudTimer);
  _cloudTimer = setTimeout(_cloudSaveNow, 2000);
}

async function _cloudSaveNow() {
  if (!SUPABASE_URL) return;
  setDbStatus('Sincronizando...', '');
  try {
    const r = await fetch(SUPABASE_URL + '/rest/v1/album_state', {
      method: 'POST',
      headers: _sbHeaders({ 'Prefer': 'resolution=merge-duplicates' }),
      body: JSON.stringify({ id: CLOUD_ID, state, updated_at: new Date().toISOString() })
    });
    setDbStatus(r.ok ? '☁️ Salvo na nuvem' : '⚠️ Erro ao salvar', r.ok ? 'saved' : 'unsaved');
  } catch(e) {
    setDbStatus('Offline — salvo no navegador', '');
  }
}

// ============================================================
// STATE MANAGEMENT
// ============================================================
const STORAGE_KEY = 'copa2026_album_v3';
let state = {}; // code -> 0 (missing), 1 (collected), 2 (double)
let currentSection = null;
let currentTab = 'overview';
let searchQuery = '';
let filterMode = 'all'; // all, missing, collected, double

async function loadState() {
  // 1. Ponto de partida: localStorage (funciona offline)
  try {
    const saved = localStorage.getItem(STORAGE_KEY);
    state = saved ? JSON.parse(saved) : {};
  } catch(e) { state = {}; }

  // 2. Nuvem sobrescreve localStorage (dispositivos sempre sincronizados)
  if (SUPABASE_URL) {
    try {
      setDbStatus('Conectando à nuvem...', '');
      const cloudState = await cloudLoad();
      if (cloudState && Object.keys(cloudState).length > 0) {
        state = cloudState;
        localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
        setDbStatus('☁️ Dados da nuvem', 'saved');
      } else if (!Object.keys(state).length) {
        _initFromAlbum();  // primeira vez: inicializa de inAlbum
      }
    } catch(e) {
      setDbStatus('Offline — dados locais', '');
    }
  } else {
    if (!Object.keys(state).length) _initFromAlbum();
  }

  // 3. Sincroniza BIDIRECIONALMENTE com inAlbum (planilhas CSV são fonte de verdade):
  //    - inAlbum=2 e state<2 → promove para "repetida"
  //    - inAlbum=1 e state=0 → promove para "colada"
  //    - inAlbum=0 e state=1 → rebaixa para "faltando"
  let _dirty = false;
  for (const team of Object.values(TEAMS)) {
    for (const [code, , inAlbum] of team.s) {
      const cur = state[code] ?? 0;
      if      (inAlbum === 2 && cur < 2)  { state[code] = 2; _dirty = true; }
      else if (inAlbum === 1 && cur === 0) { state[code] = 1; _dirty = true; }
      else if (inAlbum === 0 && cur === 1) { state[code] = 0; _dirty = true; }
    }
  }
  if (_dirty) {
    localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
    cloudSaveDebounced();
  }
}

function _initFromAlbum() {
  state = {};
  for (const [, team] of Object.entries(TEAMS)) {
    for (const [code, , inAlbum] of team.s) { state[code] = inAlbum; }
  }
}

function initFromPhotos() { _initFromAlbum(); saveState(); }

function saveState() {
  localStorage.setItem(STORAGE_KEY, JSON.stringify(state));
  localStorage.setItem('copa2026_savedAt', new Date().toISOString());
  if (SUPABASE_URL) {
    cloudSaveDebounced();
  } else {
    autoSaveToFile();
  }
}

function getStickerState(code) {
  return state[code] !== undefined ? state[code] : 0;
}

function cycleState(code) {
  const current = getStickerState(code);
  state[code] = (current + 1) % 3;
  saveState();
  return state[code];
}

// ============================================================
// STATS
// ============================================================
function getStats() {
  let total = 0, collected = 0, doubles = 0, missing = 0;
  for (const [teamId, team] of Object.entries(TEAMS)) {
    for (const [code] of team.s) {
      total++;
      const s = getStickerState(code);
      if (s === 0) missing++;
      else if (s === 1) collected++;
      else if (s === 2) doubles++;
    }
  }
  return { total, collected, doubles, missing };
}

function getTeamStats(teamId) {
  const team = TEAMS[teamId];
  let total = 0, collected = 0, doubles = 0, missing = 0;
  for (const [code] of team.s) {
    total++;
    const s = getStickerState(code);
    if (s === 0) missing++;
    else if (s === 1) collected++;
    else if (s === 2) doubles++;
  }
  return { total, collected, doubles, missing };
}

// RENDER FUNCTIONS
// ============================================================
function renderHeader() {
  const stats = getStats();
  const pct = Math.round((stats.collected + stats.doubles) / stats.total * 100);
  document.getElementById('headerStats').innerHTML = `
    <div class="stat-pill green">✅ ${stats.collected + stats.doubles} Tenho</div>
    <div class="stat-pill red">❌ ${stats.missing} Faltam</div>
    <div class="stat-pill gold">⭐ ${stats.doubles} Repetidas</div>
    <div class="stat-pill">${pct}% Completo</div>
  `;
  document.getElementById('mainProgressBar').style.width = pct + '%';
}

function renderSidebar() {
  const sidebar = document.getElementById('sidebar');
  const groups = {};
  for (const [id, team] of Object.entries(TEAMS)) {
    const g = team.group || 'Especial';
    if (!groups[g]) groups[g] = [];
    groups[g].push([id, team]);
  }
  let html = '';
  for (const [groupName, teams] of Object.entries(groups).sort()) {
    html += `<div class="sidebar-section">
      <div class="sidebar-group-label">Grupo ${groupName}</div>`;
    for (const [id, team] of teams.sort((a,b) => a[1].name.localeCompare(b[1].name))) {
      const ts = getTeamStats(id);
      const pct = Math.round((ts.collected + ts.doubles) / ts.total * 100);
      const active = currentSection === id ? 'active' : '';
      html += `<div class="sidebar-item ${active}" onclick="selectSection('${id}')">
        <span class="flag">${team.flag}</span>
        <div class="info">
          <div class="name">${team.name}</div>
          <div class="progress">${ts.collected + ts.doubles}/${ts.total}</div>
          <div class="sidebar-mini-bar"><div class="sidebar-mini-fill" style="width:${pct}%"></div></div>
        </div>
      </div>`;
    }
    html += '</div>';
  }
  sidebar.innerHTML = html;
}

function selectSection(id) {
  currentSection = id;
  switchTab('stickers');
  renderSidebar();
  renderMain();
  window.scrollTo(0, 0);
}

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById('tab-' + tab)?.classList.add('active');
  if (tab !== 'stickers') currentSection = null;
  filterMode = 'all';
  renderSidebar();
  renderMain();
}

function renderMain() {
  const main = document.getElementById('mainContent');
  if (searchQuery) {
    renderSearch(main);
    return;
  }
  switch (currentTab) {
    case 'overview': renderOverview(main); break;
    case 'grupos': renderGrupos(main); break;
    case 'stickers': currentSection ? renderStickerView(main, currentSection) : renderOverview(main); break;
    case 'missing': renderMissingList(main); break;
    case 'trade': renderTradeList(main); break;
  }
}

function renderGrupos(main) {
  const groups = {};
  for (const [id, team] of Object.entries(TEAMS)) {
    const g = team.group || 'Especial';
    if (!groups[g]) groups[g] = [];
    groups[g].push([id, team]);
  }

        <span class="gprog">${groupCollected}/${groupTotal} (${gPct}%)</span>

function renderStickerView(main, teamId) {
  const team = TEAMS[teamId];
  if (!team) { main.innerHTML = '<div class="empty-state"><div class="icon">🤔</div><h3>País não encontrado</h3></div>'; return; }

  const ts = getTeamStats(teamId);
  const pct = Math.round((ts.collected + ts.doubles) / ts.total * 100);

  let stickers = team.s.map(([code, player, _]) => ({
    code, player, state: getStickerState(code)
  }));

  if (filterMode === 'missing') stickers = stickers.filter(s => s.state === 0);
  else if (filterMode === 'collected') stickers = stickers.filter(s => s.state === 1);
  else if (filterMode === 'double') stickers = stickers.filter(s => s.state === 2);

  const statusEmojis = ['❌','✅','⭐'];
  const statusLabels = ['FALTA','TENHO','REPET'];
  const statusClass = ['missing','collected','double'];

  const doubleCodes = team.s.filter(([c]) => getStickerState(c) === 2).map(([c]) => c);
  const missingCodes = team.s.filter(([c]) => getStickerState(c) === 0).map(([c]) => c);

  let html = `
  <button class="back-btn" onclick="switchTab('overview')">← Voltar</button>
  <div class="section-header">
    <div class="section-flag">${team.flag}</div>
    <div class="section-info">
      <h2>${team.name}</h2>
      <p>Grupo ${team.group} • ${team.conf} • ${ts.total} figurinhas</p>
    </div>
    <div class="section-stats">
      <div class="stat-pill green">✅ ${ts.collected}</div>
      <div class="stat-pill red">❌ ${ts.missing}</div>
      <div class="stat-pill gold">⭐ ${ts.doubles}</div>
    </div>
  </div>
  <div class="progress-bar-wrap" style="margin-bottom:12px">
    <div class="progress-bar-fill" style="width:${pct}%"></div>
  </div>
  <div class="filter-bar">
    <button class="filter-btn ${filterMode==='all'?'active':''}" onclick="setFilter('all')">Todas (${ts.total})</button>
    <button class="filter-btn ${filterMode==='collected'?'active':''}" onclick="setFilter('collected')">✅ Tenho (${ts.collected})</button>
    <button class="filter-btn ${filterMode==='missing'?'active':''}" onclick="setFilter('missing')">❌ Faltam (${ts.missing})</button>
    <button class="filter-btn ${filterMode==='double'?'active':''}" onclick="setFilter('double')">⭐ Repetidas (${ts.doubles})</button>
  </div>
  <div class="legend">
    <div class="legend-item"><div class="legend-dot missing"></div>Faltando</div>
    <div class="legend-item"><div class="legend-dot collected"></div>Tenho</div>
    <div class="legend-item"><div class="legend-dot double"></div>Repetida</div>
  </div>
  <div class="sticker-grid">`;

  for (const {code, player, state: s} of stickers) {
    html += `<div class="sticker-card ${statusClass[s]}" onclick="openStickerModalByCode('${code}')">
      <span class="status-label">${statusLabels[s]}</span>
      <div class="sticker-status">${statusEmojis[s]}</div>
      <div class="sticker-code">${code}</div>
      <div class="sticker-player">${player || '—'}</div>
    </div>`;
  }

  html += `</div>`;

  if (doubleCodes.length > 0) {
    html += `<div class="trade-section">
      <h3>⭐ Para Trocar (${doubleCodes.length})</h3>
      <div class="trade-list">${doubleCodes.map(c => `<span class="trade-tag have">${c}</span>`).join('')}</div>
    </div>`;
  }
  if (missingCodes.length > 0) {
    html += `<div class="trade-section" style="margin-top:8px">
      <h3>❌ Preciso Trocar (${missingCodes.length})</h3>
      <div class="trade-list">${missingCodes.map(c => `<span class="trade-tag need">${c}</span>`).join('')}</div>
    </div>`;
  }

  main.innerHTML = html;
}

function setFilter(mode) {
  filterMode = mode;
  renderMain();
}

function renderMissingList(main) {
  const allMissing = [];
  for (const [teamId, team] of Object.entries(TEAMS)) {
    for (const [code, player] of team.s) {
      if (getStickerState(code) === 0) {
        allMissing.push({ code, player, team: team.name, flag: team.flag, group: team.group });
      }
    }
  }
  if (allMissing.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🎉</div><h3>Álbum Completo!</h3><p>Parabéns! Você tem todas as figurinhas!</p></div>`;
    return;
  }
  const byGroup = {};
  for (const item of allMissing) {
    const g = item.group;
    if (!byGroup[g]) byGroup[g] = [];
    byGroup[g].push(item);
  }
  let html = `<h2 style="font-size:18px;margin-bottom:16px">❌ Faltam ${allMissing.length} figurinhas</h2>`;
  for (const [g, items] of Object.entries(byGroup).sort()) {
    html += `<h3 style="font-size:13px;color:var(--text2);letter-spacing:1px;text-transform:uppercase;margin:14px 0 8px">Grupo ${g}</h3>
    <div class="missing-grid">`;
    for (const {code, player, team, flag} of items) {
      html += `<div class="missing-item" onclick="openStickerModalByCode('${code}')">
        <span class="flag">${flag}</span>
        <div class="minfo">
          <div class="mcode">${code}</div>
          <div class="mplayer">${player || team}</div>
        </div>
        <span style="color:var(--red);font-size:20px">❌</span>
      </div>`;
    }
    html += '</div>';
  }
  main.innerHTML = html;
}

function renderTradeList(main) {
  const allDoubles = [];
  for (const [teamId, team] of Object.entries(TEAMS)) {
    for (const [code, player] of team.s) {
      if (getStickerState(code) === 2) {
        allDoubles.push({ code, player, team: team.name, flag: team.flag });
      }
    }
  }
  if (allDoubles.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">⭐</div><h3>Nenhuma repetida</h3><p>As figurinhas repetidas aparecem aqui para você organizar as trocas.</p></div>`;
    return;
  }
  let html = `<h2 style="font-size:18px;margin-bottom:8px">⭐ ${allDoubles.length} Repetidas para Trocar</h2>
  <p style="color:var(--text2);font-size:13px;margin-bottom:16px">Mostre essa lista para um amigo e troque as figurinhas!</p>
  <div class="trade-list" style="margin-bottom:24px">`;
  for (const {code, player, flag} of allDoubles) {
    html += `<span class="trade-tag have" title="${player}" onclick="openStickerModalByCode('${code}')" style="cursor:pointer">${flag} ${code}</span>`;
  }
  html += '</div>';

  const missing = [];
  for (const [teamId, team] of Object.entries(TEAMS)) {
    for (const [code, player] of team.s) {
      if (getStickerState(code) === 0) missing.push({ code, player, flag: team.flag });
    }
  }
  html += `<h3 style="font-size:14px;margin-bottom:8px;margin-top:24px">❌ Você precisa (${missing.length})</h3>
  <div class="trade-list">`;
  for (const {code, player, flag} of missing.slice(0, 50)) {
    html += `<span class="trade-tag need" onclick="openStickerModalByCode('${code}')" style="cursor:pointer" title="${player}">${flag} ${code}</span>`;
  }
  if (missing.length > 50) html += `<span style="color:var(--text2);font-size:12px">...e mais ${missing.length - 50}</span>`;
  html += '</div>';
  main.innerHTML = html;
}

function renderSearch(main) {
  const q = searchQuery.toLowerCase();
  const results = [];
  for (const [teamId, team] of Object.entries(TEAMS)) {
    for (const [code, player] of team.s) {
      if (code.toLowerCase().includes(q) || player.toLowerCase().includes(q) || team.name.toLowerCase().includes(q)) {
        results.push({ code, player, team: team.name, flag: team.flag, state: getStickerState(code) });
      }
    }
  }
  if (results.length === 0) {
    main.innerHTML = `<div class="empty-state"><div class="icon">🔍</div><h3>Nenhum resultado</h3><p>Tente buscar pelo código (ex: "BRA 10") ou nome do jogador.</p></div>`;
    return;
  }
  const statusEmojis = ['❌','✅','⭐'];
  const statusClass = ['missing','collected','double'];
  let html = `<p style="color:var(--text2);font-size:13px;margin-bottom:12px">${results.length} resultado(s) para "<strong>${searchQuery}</strong>"</p>
  <div class="sticker-grid">`;
  for (const {code, player, flag, state: s} of results) {
    html += `<div class="sticker-card ${statusClass[s]}" onclick="openStickerModalByCode('${code}')">
      <div class="sticker-status">${flag} ${statusEmojis[s]}</div>
      <div class="sticker-code">${code}</div>
      <div class="sticker-player">${player || '—'}</div>
    </div>`;
  }
  html += '</div>';
  main.innerHTML = html;
}

function openStickerModal(code, teamName, teamFlag) {
  let player = '';
  for (const team of Object.values(TEAMS)) {
    const found = team.s.find(([c]) => c === code);
    if (found) { player = found[1]; break; }
  }
  showModal(code, player, teamName, teamFlag);
}

function openStickerModalByCode(code) {
  for (const [teamId, team] of Object.entries(TEAMS)) {
    const found = team.s.find(([c]) => c === code);
    if (found) {
      showModal(code, found[1], team.name, team.flag);
      return;
    }
  }
}

// ============================================================
// DATABASE — FILE SYSTEM ACCESS API + INDEXEDDB + FALLBACKS
// ============================================================
let fileHandle = null;        // FSA handle para auto-save
let dbDirty = false;          // pendente de salvar no arquivo
const IDB_NAME = 'copa2026';
const IDB_STORE = 'meta';

// IndexedDB: persiste o fileHandle entre sessões
function openIDB() {
  return new Promise((res, rej) => {
    const req = indexedDB.open(IDB_NAME, 1);
    req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE);
    req.onsuccess = e => res(e.target.result);
    req.onerror = () => rej(req.error);
  });
}
async function idbSet(key, value) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readwrite');
    tx.objectStore(IDB_STORE).put(value, key);
    tx.oncomplete = res; tx.onerror = rej;
  });
}
async function idbGet(key) {
  const db = await openIDB();
  return new Promise((res, rej) => {
    const tx = db.transaction(IDB_STORE, 'readonly');
    const req = tx.objectStore(IDB_STORE).get(key);
    req.onsuccess = () => res(req.result);
    req.onerror = rej;
  });
}

function setDbStatus(msg, dot) {
  const d = document.getElementById('dbDot');
  const t = document.getElementById('dbStatusText');
  if (d) { d.className = 'db-dot ' + (dot || ''); }
  if (t) t.textContent = msg;
}

// Salvar para arquivo via File System Access API
async function saveToFile() {
  if (!('showSaveFilePicker' in window)) {
    showToast('⚠️ Use o botão Backup para salvar como JSON');
    return;
  }
  try {
    if (!fileHandle) {
      fileHandle = await window.showSaveFilePicker({
        suggestedName: 'album-copa-2026-dados.json',
        types: [{ description: 'Dados do Álbum', accept: { 'application/json': ['.json'] } }]
      });
      await idbSet('fileHandle', fileHandle);
    }
    await writeToFileHandle(fileHandle);
    showToast('💾 Dados salvos no arquivo!');
    setDbStatus('Arquivo: ' + fileHandle.name, 'saved');
    dbDirty = false;
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Erro ao salvar: ' + e.message);
  }
}

async function writeToFileHandle(handle) {
  const writable = await handle.createWritable();
  const data = { state, childName: getChildName(), savedAt: new Date().toISOString(), version: 3 };
  await writable.write(JSON.stringify(data, null, 2));
  await writable.close();
}

// Carregar de arquivo via FSA
async function loadFromFile() {
  if (!('showOpenFilePicker' in window)) {
    document.getElementById('uploadInput').click();
    return;
  }
  try {
    const [handle] = await window.showOpenFilePicker({
      types: [{ description: 'Dados do Álbum', accept: { 'application/json': ['.json'] } }]
    });
    fileHandle = handle;
    await idbSet('fileHandle', fileHandle);
    const file = await handle.getFile();
    await applyFileData(await file.text());
    showToast('📂 Dados carregados de ' + handle.name + '!');
    setDbStatus('Arquivo: ' + handle.name, 'saved');
  } catch (e) {
    if (e.name !== 'AbortError') showToast('Erro ao carregar: ' + e.message);
  }
}

// Auto-reconectar handle salvo no IDB
async function tryReconnectFileHandle() {
  try {
    const handle = await idbGet('fileHandle');
    if (!handle) return;
    const perm = await handle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      fileHandle = handle;
      // Lê o arquivo para verificar se é mais recente que localStorage
      const file = await handle.getFile();
      const text = await file.text();
      const diskData = JSON.parse(text);
      const diskTime = new Date(diskData.savedAt || 0);
      const lsTime = new Date(localStorage.getItem('copa2026_savedAt') || 0);
      if (diskTime > lsTime) {
        if (confirm(`📂 Arquivo "${handle.name}" tem dados mais recentes (${diskData.savedAt?.slice(0,10)}). Carregar do arquivo?`)) {
          await applyFileData(text);
        }
      }
      setDbStatus('Arquivo: ' + handle.name, 'saved');
    } else {
      setDbStatus('Clique 💾 para reconectar arquivo', 'unsaved');
    }
  } catch (e) { /* silencioso */ }
}

async function applyFileData(text) {
  try {
    const data = JSON.parse(text);
    state = data.state || data; // compatibilidade com formato antigo
    if (data.childName) {
      const inp = document.getElementById('childName');
      if (inp) inp.value = data.childName;
      localStorage.setItem('copa2026_childName', data.childName);
    }
    saveState();
    renderAll();
  } catch (e) {
    showToast('Arquivo inválido: ' + e.message);
  }
}

// Auto-save no arquivo após cada mudança
async function autoSaveToFile() {
  if (!fileHandle) { setDbStatus('Salvo no navegador', ''); return; }
  try {
    const perm = await fileHandle.queryPermission({ mode: 'readwrite' });
    if (perm === 'granted') {
      await writeToFileHandle(fileHandle);
      setDbStatus('Arquivo: ' + fileHandle.name, 'saved');
      dbDirty = false;
      localStorage.setItem('copa2026_savedAt', new Date().toISOString());
    } else {
      dbDirty = true;
      setDbStatus('⚠️ Permissão expirou — clique 💾', 'unsaved');
    }
  } catch (e) { dbDirty = true; }
}

// FALLBACK: download JSON
function downloadBackup() {
  const data = { state, childName: getChildName(), savedAt: new Date().toISOString(), version: 3 };
  const blob = new Blob([JSON.stringify(data, null, 2)], { type: 'application/json' });
  const url = URL.createObjectURL(blob);
  const a = document.createElement('a');
  a.href = url; a.download = 'album-copa-2026-dados.json'; a.click();
  URL.revokeObjectURL(url);
  showToast('⬇️ Backup baixado!');
}

// FALLBACK: restaurar de upload
function restoreFromUpload(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = async e => {
    await applyFileData(e.target.result);
    showToast('⬆️ Dados restaurados de ' + file.name + '!');
    setDbStatus('localStorage (backup restaurado)', 'saved');
  };
  reader.readAsText(file);
  input.value = '';
}

// Nome da criança
function getChildName() {
  return document.getElementById('childName')?.value || localStorage.getItem('copa2026_childName') || '';

}
function loadChildName() {

  const inp = document.getElementById('childName');
  if (inp && name) inp.value = name;
}
